services:
  laravel:
    build:
      context: ./docker/8.2
      dockerfile: Dockerfile
      args:
        WWWGROUP: ${WWWGROUP:-1000}
        NODE_VERSION: ${NODE_VERSION:-20}
    image: csv-upload/laravel
    container_name: csv-upload
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "${APP_PORT:-8000}:80"
      - "${VITE_PORT:-5173}:5173"
      - "6001:6001"
    environment:
      WWWUSER: ${WWWGROUP:-1000}
      LARAVEL_SAIL: 1
      XDEBUG_MODE: ${XDEBUG_MODE:-off}
      XDEBUG_CONFIG: ${XDEBUG_CONFIG:-client_host=host.docker.internal}
      PUSHER_APP_ID: ${PUSHER_APP_ID:-csv_upload}
      PUSHER_APP_KEY: ${PUSHER_APP_KEY:-csv_upload_key}
      PUSHER_APP_SECRET: ${PUSHER_APP_SECRET:-csv_upload_secret}
      PUSHER_HOST: ${PUSHER_HOST:-127.0.0.1}
      PUSHER_PORT: ${PUSHER_PORT:-6001}
      PUSHER_SCHEME: ${PUSHER_SCHEME:-http}
      PUSHER_APP_CLUSTER: ${PUSHER_APP_CLUSTER:-mt1}
    volumes:
      - .:/var/www/html
    networks:
      - sail
    depends_on:
      - mysql
      - redis
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost"]
      retries: 3
      timeout: 5s

  mysql:
    image: mysql:8.0
    container_name: csv-upload-mysql
    ports:
      - "${FORWARD_DB_PORT:-3307}:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_ROOT_HOST: "%"
      MYSQL_DATABASE: ${DB_DATABASE:-csv_upload}
      MYSQL_USER: ${DB_USERNAME:-sail}
      MYSQL_PASSWORD: ${DB_PASSWORD:-password}
    volumes:
      - sail-mysql:/var/lib/mysql
      - ./docker/mysql/create-testing-database.sh:/docker-entrypoint-initdb.d/create-testing-database.sh
    networks:
      - sail
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      retries: 3
      timeout: 5s

  redis:
    image: redis:7-alpine
    container_name: csv-upload-redis
    ports:
      - "${FORWARD_REDIS_PORT:-6380}:6379"
    volumes:
      - sail-redis:/data
    networks:
      - sail
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      retries: 3
      timeout: 5s

networks:
  sail:
    driver: bridge

volumes:
  sail-mysql:
    driver: local
  sail-redis:
    driver: local
